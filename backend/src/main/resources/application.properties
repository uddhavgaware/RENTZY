server.port=8080
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Database Configuration (Standard Spring)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Low-level Hibernate/Jakarta Overrides (Force Hibernate to see the URL)
spring.jpa.properties.jakarta.persistence.jdbc.url=${SPRING_DATASOURCE_URL}
spring.jpa.properties.jakarta.persistence.jdbc.user=${SPRING_DATASOURCE_USERNAME}
spring.jpa.properties.jakarta.persistence.jdbc.password=${SPRING_DATASOURCE_PASSWORD}

# Force Dialect to prevent metadata check failures
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# HikariCP Performance & Stability
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.minimum-idle=1

# JWT Settings
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# External Integrations
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.messaging.service.sid=${TWILIO_MESSAGING_SERVICE_SID}
frontend.url=${FRONTEND_URL:http://localhost:5173}
