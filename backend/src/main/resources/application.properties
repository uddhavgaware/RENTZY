server.port=8080
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://rentxybookings.onrender.com,https://rentxy.in,https://www.rentxy.in}

# ========================
# DATABASE (Local H2)
# ========================
spring.datasource.url=jdbc:h2:file:./data/rentzydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=1

# ========================
# JWT
# ========================
jwt.secret=${JWT_SECRET:bXlTZWNyZXRLZXlGb3JMb2NhbERldmVsb3BtZW50T25seTEyMzQ1Njc4OTAxMjM0NTY3ODkw}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ========================
# GOOGLE OAUTH
# ========================
google.client.id=${GOOGLE_CLIENT_ID:}

# ========================
# TWILIO (SMS OTP)
# ========================
twilio.account.sid=${TWILIO_ACCOUNT_SID:placeholder}
twilio.auth.token=${TWILIO_AUTH_TOKEN:placeholder}
twilio.messaging.service.sid=${TWILIO_MESSAGING_SERVICE_SID:placeholder}

# ========================
# SPRING MAIL (Gmail SMTP)
# ========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:placeholder}
spring.mail.password=${MAIL_PASSWORD:placeholder}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ========================
# RAZORPAY (Payments)
# ========================
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:placeholder}

# ========================
# FILE UPLOAD & CLOUDINARY
# ========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:placeholder}
cloudinary.api_key=${CLOUDINARY_API_KEY:placeholder}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:placeholder}

# ========================
# FRONTEND URL
# ========================
frontend.url=${FRONTEND_URL:http://localhost:5173}
