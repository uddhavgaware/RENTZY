server.port=${PORT:8080}

# ========================
# DATABASE (Neon PostgreSQL)
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://***REMOVED***/neondb?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:***REMOVED***}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:***REMOVED***}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.minimum-idle=1
