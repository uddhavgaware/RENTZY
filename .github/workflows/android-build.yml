name: Build Android APK

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'frontend/public/rentxy.apk'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./frontend
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_API_URL: https://rentxy.onrender.com/api
        run: npm run build

      - name: Sync Capacitor
        working-directory: ./frontend
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: ./frontend/android
        run: chmod +x gradlew

      - name: Build Android Release APK
        working-directory: ./frontend/android
        run: ./gradlew assembleRelease

      - name: Copy APK to Public Web Folder
        run: cp frontend/android/app/build/outputs/apk/release/app-release.apk frontend/public/rentxy.apk

      - name: Commit and Push APK to Repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update android apk for web download [skip ci]"
          file_pattern: frontend/public/rentxy.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RENTZY-app-release.apk
          path: frontend/public/rentxy.apk
